<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #101411; }
    .prompt { fill: none; stroke: #F7F2E8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .sparkle { fill: #B9FF3D; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: transparent; }
    }
  </style>

  <!-- Background: dark in light mode, transparent in dark mode -->
  <rect class="bg" width="32" height="32" rx="5"/>

  <!-- > chevron (prompt indicator) -->
  <polyline class="prompt" points="7.5,11 14,16.5 7.5,22"/>

  <!-- _ underscore (cursor) -->
  <line class="prompt" x1="15.5" y1="22.5" x2="23" y2="22.5"/>

  <!-- 4-pointed sparkle (upper right) -->
  <path class="sparkle" d="M 23 4 Q 23 9 28 9 Q 23 9 23 14 Q 23 9 18 9 Q 23 9 23 4 Z"/>
</svg>
